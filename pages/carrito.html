<section id="carrito" class="container mt-5">
    <h2 class="text-center mb-4">Carrito</h2>

    <ul id="lista-carrito" class="list-group mb-3"></ul>

    <a data-link="pages/carrito.html" class="btn btn-outline-light">
        <i class="bi bi-cart"></i> Ver carrito
    </a>

    <p class="fs-5">
        <strong>Total: $<span id="total">0</span></strong>
    </p>

    <button id="vaciar-carrito" class="btn btn-danger">
        Vaciar carrito
    </button>
    <button id="comprar" class="btn btn-success ms-2">
        Comprar
    </button>

    <div id="mensaje-compra" class="mt-3"></div>
</section>

<script src="../js/index.js"></script>
<section>
    <div class="modal fade" id="modalCompra" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Confirmar compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    ¿Deseas finalizar la compra?
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-success" id="confirmarCompra">
                        Confirmar
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>
