<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/index.html">Amatista Tienda</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#productos">Mis productos</a>
                        </li>
                        <li class="nav-item ms-3">
                            <a href="pages/carrito.html" class="nav-link position-relative">
                                <i class="bi bi-cart3 fs-5"></i>

                                <!-- Badge contador -->
                                <span id="contador-carrito"
                                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                    0
                                </span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#contacto">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <section id="carrito" class="container mt-5">
        <h2 class="text-center mb-4">Carrito</h2>

        <ul id="lista-carrito" class="list-group mb-3"></ul>

        <a href="pages/carrito.html" class="btn btn-outline-light">
            <i class="bi bi-cart"></i> Ver carrito
        </a>

        <p class="fs-5">
            <strong>Total: $<span id="total">0</span></strong>
        </p>

        <button id="vaciar-carrito" class="btn btn-danger">
            Vaciar carrito
        </button>
        <button id="comprar" class="btn btn-success ms-2">
            Comprar
        </button>

        <div id="mensaje-compra" class="mt-3"></div>
    </section>



    <script src="../js/index.js"></script>
</body>

</html>
