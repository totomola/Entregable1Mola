<section id="carrito" class="container py-5">
    <h2 class="text-center mb-4">Carrito</h2>

    <ul id="lista-carrito" class="list-group mb-3"></ul>

    <p class="fs-5">
        <strong>Total: $<span id="total">0</span></strong>
    </p>

    <button id="vaciar-carrito" class="btn btn-outline-dark">
        Vaciar carrito
    </button>
    <button id="comprar" class="btn btn-outline-dark ms-2">
        Ir a pagar
    </button>

    <div id="mensaje-compra" class="mt-3"></div>
</section>

<section>
    <div class="modal fade" id="modalCompra" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-carrito">
                    <h5 class="modal-title">Confirmar compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body bg-carrito">
                    ¿Deseas finalizar la compra?
                </div>

                <div class="modal-footer bg-carrito">
                    <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="button" class="btn btn-outline-dark" id="confirmarCompra">
                        Confirmar
                    </button>
                </div>

            </div>
        </div>
    </div>
</section>
